services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: detector-api
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    volumes:
      - ./api:/app
    restart: unless-stopped
    networks:
      - detector-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  detector-network:
    driver: bridge